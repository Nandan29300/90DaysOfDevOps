name: Secrets Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Task 1: Read a secret safely — never print the raw value
  secrets-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret is set (safe way)
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi

      - name: Attempt to print secret directly (GitHub will mask it)
        run: |
          echo "Attempting direct print: ${{ secrets.MY_SECRET_MESSAGE }}"
          echo "(GitHub replaces the value with *** in the logs)"

  # Task 2: Pass secrets as environment variables to shell
  secrets-as-env:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret via environment variable
        env:
          SECRET_MSG: ${{ secrets.MY_SECRET_MESSAGE }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          echo "Secret message length : ${#SECRET_MSG} characters"
          echo "Docker username set   : $([ -n "$DOCKER_USER" ] && echo true || echo false)"
          echo "Using secret in command (not printing it):"
          echo "Would run: docker login -u $DOCKER_USER --password-stdin"

      - name: Demonstrate secret is never hardcoded
        run: |
          echo "✅ Secrets are passed via env: — never written in the YAML as plain text"
          echo "✅ Even if YAML is public, the actual values stay in GitHub's encrypted store"
