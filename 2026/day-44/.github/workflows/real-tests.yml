name: Real Tests in CI

on:
  push:
  workflow_dispatch:

jobs:
  # Task 5: Run real Python tests in CI
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Print Python version
        run: python --version

      - name: Run test suite
        run: python day-44/scripts/test_utils.py

      - name: Upload test output as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-output
          path: day-44/scripts/
          retention-days: 3
