name: Artifact Between Jobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Task 4 — Job 1: generate and upload
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate build artifact
        run: |
          mkdir -p dist
          echo "app-version=2.0.0" > dist/build-info.txt
          echo "build-number=${{ github.run_number }}" >> dist/build-info.txt
          echo "commit=${{ github.sha }}" >> dist/build-info.txt
          echo "built-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/build-info.txt
          echo "--- built files ---" >> dist/build-info.txt
          echo "app.js (142 KB)" >> dist/build-info.txt
          echo "styles.css (28 KB)" >> dist/build-info.txt
          echo "index.html (4 KB)" >> dist/build-info.txt
          echo ""
          echo "=== Artifact contents ==="
          cat dist/build-info.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 5

  # Task 4 — Job 2: download and use the artifact
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: downloaded-dist/

      - name: Print artifact contents
        run: |
          echo "=== Downloaded artifact ==="
          ls -la downloaded-dist/
          echo ""
          echo "=== build-info.txt contents ==="
          cat downloaded-dist/build-info.txt

      - name: Use artifact data in deploy step
        run: |
          VERSION=$(grep "app-version" downloaded-dist/build-info.txt | cut -d= -f2)
          BUILD=$(grep "build-number" downloaded-dist/build-info.txt | cut -d= -f2)
          echo "Deploying version $VERSION (build #$BUILD)..."
          echo "✅ Deploy complete"
