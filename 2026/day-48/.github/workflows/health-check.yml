name: Scheduled Health Check

on:
  schedule:
    # Every 12 hours: 00:00 and 12:00 UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/day48-capstone-app:latest
  CONTAINER_NAME: day48-health-probe

jobs:
  health-check:
    name: Container health check
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Pull the latest image ─────────────────────────────────────────────────
      - name: Pull latest image
        run: |
          echo "Pulling: ${{ env.IMAGE }}"
          docker pull "${{ env.IMAGE }}"
          echo "Image pulled successfully"

      # ── Run the container in detached mode ────────────────────────────────────
      - name: Start container
        run: |
          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            -p 3000:3000 \
            "${{ env.IMAGE }}"
          echo "Container started"

      # ── Wait for the app to be ready ──────────────────────────────────────────
      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to start..."
          sleep 5
          # Retry up to 10 times (50s total)
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "App is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: app not ready yet — waiting 5s"
            sleep 5
          done

      # ── Run health check ──────────────────────────────────────────────────────
      - name: Health check
        id: health
        run: |
          RESPONSE=$(curl -s --max-time 10 http://localhost:3000/health)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:3000/health)

          echo "HTTP status : $HTTP_CODE"
          echo "Response    : $RESPONSE"

          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")

          if [ "$HTTP_CODE" -eq 200 ] && [ "$STATUS" = "ok" ]; then
            echo "health_status=PASSED" >> "$GITHUB_OUTPUT"
            echo "✅ Health check PASSED"
          else
            echo "health_status=FAILED" >> "$GITHUB_OUTPUT"
            echo "❌ Health check FAILED (HTTP $HTTP_CODE, status=$STATUS)"
            exit 1
          fi

      # ── Always stop and remove the container ─────────────────────────────────
      - name: Stop and remove container
        if: always()
        run: |
          docker stop "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
          docker rm   "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
          echo "Container cleaned up"

      # ── Write step summary ────────────────────────────────────────────────────
      - name: Health check summary
        if: always()
        run: |
          echo "## Health Check Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:**  \`${{ env.IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.health.outputs.health_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:**   $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
