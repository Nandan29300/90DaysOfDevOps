name: Docker Build & Push

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/day45-cicd-app

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Compute short commit SHA for the image tag ───────────────────────
      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ── 3. Set up Docker Buildx (enables layer caching & multi-platform) ────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub — only on main branch (not on PRs) ─────────
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── 5. Build image (all branches) and push (main only) ─────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./day-45/app
          # push = true only when on main AND it's a real push (not a PR)
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.short_sha }}
          # Inject build metadata into the image via build-args
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          # Cache layers from the GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 6. Summary (always runs — confirms what happened) ───────────────────
      - name: Pipeline summary
        run: |
          echo "## Docker CI/CD Summary" >> "$GITHUB_STEP_SUMMARY"
          echo ""                         >> "$GITHUB_STEP_SUMMARY"
          echo "| Key        | Value |"   >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------|"   >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch     | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA | \`${{ steps.vars.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image      | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pushed     | \`${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}\` |" >> "$GITHUB_STEP_SUMMARY"
