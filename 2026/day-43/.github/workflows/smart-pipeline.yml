name: Smart Pipeline

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run lint checks
        run: |
          echo "Running linter on branch: ${{ github.ref_name }}"
          echo "✅ No lint errors found"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running test suite on branch: ${{ github.ref_name }}"
          echo "✅ All tests passed"

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Print pipeline summary
        run: |
          echo "==============================="
          echo "       Pipeline Summary"
          echo "==============================="
          echo "Commit SHA    : ${{ github.sha }}"
          echo "Triggered by  : ${{ github.actor }}"
          echo "Branch        : ${{ github.ref_name }}"
          echo "Event         : ${{ github.event_name }}"
          echo "Lint status   : ✅ passed"
          echo "Test status   : ✅ passed"

      - name: Identify branch type
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "🚀 Main branch push — production pipeline complete"
          else
            echo "🔀 Feature branch push ($BRANCH) — CI checks passed"
          fi

      - name: Print commit message
        run: |
          echo "Commit message: ${{ github.event.commits[0].message }}"
