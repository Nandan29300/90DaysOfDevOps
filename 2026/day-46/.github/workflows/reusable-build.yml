name: Reusable Build Pipeline

# This workflow can ONLY be triggered by another workflow via workflow_call.
# It cannot be triggered by a push, PR, or schedule on its own.
on:
  workflow_call:
    # ── Inputs ────────────────────────────────────────────────────────────────
    inputs:
      app_name:
        description: Name of the application being built
        type: string
        required: true
      environment:
        description: Target deployment environment
        type: string
        required: false
        default: staging

    # ── Secrets (passed by the caller — value is never visible here) ──────────
    secrets:
      docker_token:
        required: true

    # ── Outputs (exposed back to the caller workflow) ─────────────────────────
    outputs:
      build_version:
        description: Versioned tag generated during the build (e.g. v1.0-a1b2c3d)
        value: ${{ jobs.build.outputs.build_version }}

jobs:
  build:
    name: Build ${{ inputs.app_name }}
    runs-on: ubuntu-latest

    # Declare job-level outputs so the workflow_call outputs section can read them
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Task 2: Print inputs (never print the secret) ──────────────────────
      - name: Print build context
        run: |
          echo "Building:    ${{ inputs.app_name }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Docker token is set: $([ -n '${{ secrets.docker_token }}' ] && echo true || echo false)"

      # ── Task 4: Generate a version string and expose it as output ──────────
      - name: Generate build version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="v1.0-${SHORT_SHA}"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated build version: ${BUILD_VERSION}"

      - name: Build summary
        run: |
          echo "## Reusable Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo ""                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Key         | Value |"    >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------|"    >> "$GITHUB_STEP_SUMMARY"
          echo "| App         | \`${{ inputs.app_name }}\` |"    >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version     | \`$(echo "${{ github.sha }}" | cut -c1-7 | xargs -I{} echo "v1.0-{}")\` |" >> "$GITHUB_STEP_SUMMARY"
