name: Call Reusable Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Task 3: Call the reusable workflow ───────────────────────────────────────
  build:
    name: Invoke reusable build
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ── Task 4: Read the output from the reusable workflow ───────────────────────
  print-version:
    name: Print build version from reusable workflow
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Print version output
        run: |
          echo "Build version from reusable workflow: ${{ needs.build.outputs.build_version }}"
          echo "This version was generated inside the reusable workflow and passed back to the caller."
