name: Matrix Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false       # Task 5: keep other jobs running even if one fails

      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

        # Task 5: Exclude Python 3.10 on Windows
        exclude:
          - os: windows-latest
            python-version: "3.10"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Python version
        run: python --version

      - name: Print environment details
        run: |
          echo "OS           : ${{ matrix.os }}"
          echo "Python       : ${{ matrix.python-version }}"
          echo "Runner OS    : ${{ runner.os }}"

      - name: Install dependencies (simulate)
        run: |
          python -m pip install --upgrade pip
          echo "pip upgraded successfully"

      - name: Run tests (simulated)
        run: |
          echo "Running tests on Python ${{ matrix.python-version }} / ${{ matrix.os }}..."
          python -c "print('All tests passed ✅')"
