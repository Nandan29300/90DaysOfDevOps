name: Scheduled Health Check

on:
  schedule:
    # Every 12 hours: 00:00 and 12:00 UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/day49-capstone-app:latest
  CONTAINER_NAME: day49-health-probe

jobs:
  health-check:
    name: Container health check
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Pull latest image
        run: |
          echo "Pulling: ${{ env.IMAGE }}"
          docker pull "${{ env.IMAGE }}"
          echo "Image pulled successfully"
      - name: Start container
        run: |
          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            -p 3000:3000 \
            "${{ env.IMAGE }}"
          echo "Container started"
      - name: Wait for health endpoint
        run: |
          for i in {1..10}; do
            sleep 3
            if curl -sf http://localhost:3000/health; then
              echo "Health endpoint is up!"
              exit 0
            fi
          done
          echo "Health endpoint did not respond in time" >&2
          exit 1
      - name: Clean up
        run: |
          docker rm -f "${{ env.CONTAINER_NAME }}" || true
