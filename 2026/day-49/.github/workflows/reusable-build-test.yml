# Reusable – Build & Test

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        type: string
        required: false
        default: '20'
      run_tests:
        description: Whether to run the test suite
        type: boolean
        required: false
        default: true
    outputs:
      test_result:
        description: "'passed' if all tests succeeded, 'failed' otherwise"
        value: ${{ jobs.build-test.outputs.test_result }}

jobs:
  build-test:
    name: Build & Test (Node ${{ inputs.node_version }})
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.run-tests.outputs.test_result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: day-49/app/package-lock.json
      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: day-49/app
      - name: Run tests
        id: run-tests
        if: inputs.run_tests == true
        run: |
          npm test --prefix day-49/app
        continue-on-error: false
        env:
          NODE_ENV: test
      - name: Set test result output
        id: set-result
        run: |
          echo "test_result=passed" >> "$GITHUB_OUTPUT"
        if: success()
      - name: Set test result output (fail)
        if: failure()
        run: |
          echo "test_result=failed" >> "$GITHUB_OUTPUT"
