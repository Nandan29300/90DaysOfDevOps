name: Multi-OS Runner Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print OS info
        run: echo "Running on OS: ${{ runner.os }}"

      - name: Print hostname
        run: hostname

      - name: Print current user
        run: whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print OS info
        run: echo "Running on OS: ${{ runner.os }}"

      - name: Print hostname
        run: hostname

      - name: Print current user
        run: echo %USERNAME%

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print OS info
        run: echo "Running on OS: ${{ runner.os }}"

      - name: Print hostname
        run: hostname

      - name: Print current user
        run: whoami
