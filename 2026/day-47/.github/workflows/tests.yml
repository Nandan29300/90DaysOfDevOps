name: Run Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tests
        run: |
          echo "Running test suite..."
          python day-44/scripts/test_utils.py
          echo "✅ All tests passed"
